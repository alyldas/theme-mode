name: CI

on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: theme-mode-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check package
        run: npm run check

  dependabot-check:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: theme-mode-dependabot
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check package
        run: npm run check
