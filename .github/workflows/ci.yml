name: CI

on:
  pull_request:
  push:
    branches:
      - master
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: node:22.22.2-alpine3.22
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Check package
        run: npm run check
